services:
  mongo:
    image: mongo:7
    container_name: shopkit-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - shopkit-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  shopkit-mongo-data:
